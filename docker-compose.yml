services:

  # ── Ollama — local LLM inference ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ev_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  # ── ChromaDB — local vector store ────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: ev_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  # ── Streamlit app ─────────────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: ev_streamlit
    ports:
      - "8501:8501"   # dashboard
      - "8502:8502"   # prometheus metrics
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - RUNNING_IN_DOCKER=true
    volumes:
      - .:/app
    depends_on:
      - ollama
      - chromadb
    restart: unless-stopped

  # ── Prometheus — optional monitoring (docker compose --profile monitoring up) ─
  prometheus:
    image: prom/prometheus:latest
    container_name: ev_prometheus
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

volumes:
  ollama_models:
  chroma_data:
